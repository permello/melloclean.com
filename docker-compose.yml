services:
  client:
    build:
      context: .
      dockerfile: ./apps/client/Dockerfile.dev
    volumes:
      - .:/www
      - /www/node_modules
    ports:
      - '3000:3000'

  dashboard:
    build:
      context: .
      dockerfile: ./apps/dashboard/Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '3001:3001'
  server:
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile.dev
    volumes:
      - .:/api
      - /api/node_modules
    ports:
      - '5000:5000'
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - dashboard
      - server
