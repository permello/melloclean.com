<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Melloclean</title>
    <script>
      // SPA redirect: encode the path into the query string and send to index.html
      // so React Router can handle client-side navigation on GitHub Pages.
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 2).join('/') +
          '/?p=/' +
          l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
